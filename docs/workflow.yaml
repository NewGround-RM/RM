GEO-Erhebung: Workflow
1. Du gibst mir den Pfad
Formulierung z.B.:

„Führe eine Erhebung durch für: /Users/thilokoerkel/.../institutions/Goethe-Universitaet Frankfurt/20260319"

2. Ich lese den Ordner
Ich liste den Ordner, lese alle record_*.yaml-Dateien und extrahiere pro Datei: filename, prompt_id, prompt_kategorie, prompt_bezug, prompt_thema, prompt_text, prompt_antwortlaenge.
3. Ich baue das Artifact
Ich generiere ein React-Artifact mit einem INITIAL_DATA-Block, der alle extrahierten Daten enthält — Pfad, Modell-API, und die vollständige Records-Liste. Keine hardcodierten Konstanten.
4. Du startest die Erhebung im Artifact
Klick auf ▶ Erhebung starten. Das Artifact feuert jeden Prompt als isolierten API-Call ohne Gesprächskontext ab. Die Antwortlänge wird aus prompt_antwortlaenge gesteuert.
5. Das Artifact schickt die Ergebnisse zurück
Nach Abschluss: Klick auf ↑ Ergebnisse an Claude senden. Das Artifact ruft sendPrompt() auf und postet ein JSON-Paket mit ziel_pfad und allen Antworten in diesen Chat.
6. Ich schreibe die Antworten in die YAMLs
Ich empfange das JSON, iteriere über alle Einträge und schreibe den antwort_text in das entsprechende Feld jeder YAML-Datei im angegebenen Pfad. Alle anderen Felder bleiben unverändert.
7. Kodierung
Du beauftragst mich mit der Kodierung des Ordners — ich lese die befüllten Records, wende das Kodierschema an und schreibe die Kodierfelder direkt zurück in die YAMLs.


