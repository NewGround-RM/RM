- id: BN3001
  label: OECD
  beratungsformate: Länderberichte, Expert Panels, Konsultationen
  beispiele: OECD Education Policy Reviews, Economic Surveys
- id: BN3002
  label: Weltbank / IWF
  beratungsformate: Forschungskooperationen, Länderberatung, Working Papers
- id: BN3003
  label: Vereinte Nationen / UN-Unterorganisationen
  beratungsformate: Advisory Boards, Berichterstellung, SDG-Monitoring
  beispiele: IPCC, UNESCO, UNEP, UN Women
- id: BN3004
  label: WHO
  beratungsformate: Technical Advisory Groups, Leitlinienentwicklung, Pandemie-Beratung
- id: BN3005
  label: NATO / Sicherheitspolitische Organisationen
  beratungsformate: Science for Peace Programme, Advisory Panels
- id: BN3006
  label: WTO
  beratungsformate: Handelspolitische Gutachten, Streitschlichtung

