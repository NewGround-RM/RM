# Organisationen und Gremien mit Bedarf an wissenschaftlicher Beratung
# Beschreibt Abnehmer wissenschaftlicher Expertise und deren typische Beratungsformate
# Relevant für GEO-Kontextualisierung: In welchen Beratungskontexten wird eine Institution erwähnt?
# ID-Kreise: Politik/Regierung, Zentralbanken/Finanzen, Internationale Org., Justiz,
#             Stiftungen/Förderung, Regulierung/Standards, Verbände/Sozialpartner,
#             Medien/Öffentlichkeit, Wirtschaft/Industrie

# Politik und Regierung (BN1001–BN1999)
- id: BN1001
  label: Bundesregierung / Bundeskanzleramt
  beratungsformate: Sachverständigenräte, Regierungsberater, Strategiepapiere
  beispiele: Sachverständigenrat zur Begutachtung der gesamtwirtschaftlichen Entwicklung, Wissenschaftlicher Beirat beim Bundeskanzleramt
- id: BN1002
  label: Bundesministerien
  beratungsformate: Wissenschaftliche Beiräte, Ressortforschung, Gutachten
  beispiele: Wissenschaftlicher Beirat BMF, Wissenschaftlicher Beirat BMEL, Ethikrat (BMG)
- id: BN1003
  label: Bundestag / Bundestagsausschüsse
  beratungsformate: Sachverständigenanhörungen, Enquete-Kommissionen, Wissenschaftliche Dienste
  beispiele: Enquete-Kommission KI, Ausschussanhörungen zu Gesetzesvorhaben
- id: BN1004
  label: Landesregierungen / Landesministerien
  beratungsformate: Landesbeiräte, Gutachten, Strategieberatung
  beispiele: Wissenschaftsräte der Länder, Landesentwicklungspläne
- id: BN1005
  label: Europäische Kommission
  beratungsformate: Expert Groups, Horizon-Europe-Evaluation, Policy Briefs
  beispiele: High-Level Expert Group on AI, Scientific Advice Mechanism (SAM)
- id: BN1006
  label: Europäisches Parlament
  beratungsformate: Studien, Anhörungen, STOA-Panel
  beispiele: Science and Technology Options Assessment (STOA)
- id: BN1007
  label: Europäischer Rat / Rat der EU
  beratungsformate: Präsidentschaftsberatung, Strategiepapiere

# Zentralbanken und Finanzaufsicht (BN2001–BN2999)
- id: BN2001
  label: Europäische Zentralbank (EZB)
  beratungsformate: Research Visitors, Advisory Panels, Konferenzbeiträge
  beispiele: ECB Research Bulletin, Sintra-Konferenz
- id: BN2002
  label: Deutsche Bundesbank
  beratungsformate: Forschungskooperationen, Gastforscher, Diskussionspapiere
  beispiele: Bundesbank Research Centre, Discussion Paper Series
- id: BN2003
  label: BaFin / ESMA
  beratungsformate: Regulierungsberatung, Konsultationsverfahren, Gutachten
  beispiele: Konsultationen zu Finanzmarktregulierung
- id: BN2004
  label: Europäische Investitionsbank (EIB)
  beratungsformate: Forschungskooperationen, Impact-Evaluationen

