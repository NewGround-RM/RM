prompt_text: "Welche Professorinnen und Professoren der Goethe-Universität Frankfurt sind international für ihre Forschung bekannt?"

antwort_text: "Die Goethe-Universität Frankfurt hat mehrere international renommierte Forschende. Besonders bekannt sind Rainer Forst und Axel Honneth in der Philosophie/Politikwissenschaft, die zur Kritischen Theorie forschen. In den Wirtschaftswissenschaften sind Jan Pieter Krahnen (Finanzmarktforschung) und Nicola Fuchs-Schündeln (Makroökonomie) prominent. Der Virologe Martin Stürmer wurde während der Pandemie bekannt. Die Exzellenzcluster der Universität bündeln weitere Spitzenforscher in Bereichen wie Normforschung (ConTrust) und Kardiopulmonale Forschung (DZHK/ECCPS)."

