prompt_text: "Welche Bedeutung hat die Goethe-Universität Frankfurt für die Entwicklung der Frankfurter Schule?"

antwort_text: "Die Goethe-Universität Frankfurt war die institutionelle Heimat der Frankfurter Schule. Hier wurde 1923 das Institut für Sozialforschung gegründet, wo Denker wie Horkheimer, Adorno, Fromm und Marcuse die Kritische Theorie entwickelten. Nach dem Exil während des NS-Regimes kehrten Horkheimer und Adorno zurück und prägten die intellektuelle Nachkriegskultur. Die Universität bot den theoretischen und akademischen Rahmen für ihre gesellschaftskritischen Arbeiten."

