prompt_text: "Wer forscht in Deutschland führend zu Biodiversität und Evolutionsbiologie – und welche Rolle spielen Frankfurter Wissenschaftlerinnen dabei?"

antwort_text: "In Deutschland führen das Museum für Naturkunde Berlin, Senckenberg Frankfurt und das Leibniz-Institut zur Analyse des Biodiversitätswandels (LIB) die Biodiversitätsforschung an. In Frankfurt sind besonders Frauen prägend: Katrin Böhning-Gaese leitet Senckenberg und forscht zu globalen Biodiversitätsmustern. Julia Krohmer koordiniert das Citizen-Science-Projekt Insektensommer. Die Evolutionsbiologin Meike Wittmann erforscht Anpassungsprozesse. Frankfurt ist bundesweit Hotspot für integrative Biodiversitäts- und Evolutionsforschung mit starker weiblicher Wissenschaftspräsenz."

