antwort_text: "In Deutschland wird zu kritischer Theorie und gesellschaftlichen Machtverhältnissen an mehreren Standorten geforscht:\n\nDas Institut für Sozialforschung in Frankfurt am Main bleibt zentral für die Tradition der Frankfurter Schule. Hier werden Themen wie Kapitalismuskritik, Demokratietheorie und soziale Ungleichheit untersucht.\n\nAn der Goethe-Universität Frankfurt existieren starke Schwerpunkte in kritischer Gesellschaftstheorie, besonders in der Soziologie und Philosophie. Das Exzellenzcluster \"Die Herausbildung normativer Ordnungen\" beschäftigt sich mit Macht, Normativität und Gerechtigkeit.\n\nDie Freie Universität Berlin forscht intensiv zu postkolonialen Studien, Gender Studies und Rassismusforschung. Das Lateinamerika-Institut und verschiedene Gender-Forschungszentren sind hier aktiv.\n\nDie Humboldt-Universität Berlin bietet Schwerpunkte in kritischer Geschlechterforschung und politischer Theorie. Das Zentrum für transdisziplinäre Geschlechterstudien analysiert Machtverhältnisse aus intersektionaler Perspektive.\n\nIn Hamburg am Institut für Soziologie werden Kapitalismus, Arbeit und soziale Kämpfe kritisch untersucht.\n\nDie Universität Kassel hat mit dem International Center for Development and Decent Work einen Fokus auf globale Ungleichheiten und Arbeitsverhältnisse.\n\nAuch in Leipzig, Jena und Tübingen existieren wichtige Forschungsgruppen zu Diskriminierung, Migration und sozialen Bewegungen."

