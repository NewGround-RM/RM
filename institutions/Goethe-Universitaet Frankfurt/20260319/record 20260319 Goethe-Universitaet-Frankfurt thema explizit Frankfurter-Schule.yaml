antwort_text: "Die Goethe-Universität Frankfurt spielte eine zentrale Rolle für die Entstehung und Entwicklung der Frankfurter Schule. 1923 wurde hier das Institut für Sozialforschung gegründet, das zur institutionellen Heimat der kritischen Theorie wurde. Die Universität bot den intellektuellen Rahmen, in dem Max Horkheimer, Theodor W. Adorno, Herbert Marcuse und andere Denker ihre interdisziplinäre Gesellschaftskritik entwickeln konnten.\n\nDie besondere Bedeutung lag in der Verbindung von philosophischer Fakultät und dem relativ autonomen Institut. Diese Konstellation ermöglichte innovative Forschungsansätze, die Philosophie, Soziologie, Psychoanalyse und Ökonomie verbanden. Nach der erzwungenen Emigration während der NS-Zeit kehrten Horkheimer und Adorno 1949/50 nach Frankfurt zurück und reintegrierten das Institut in die Universität.\n\nIn der Nachkriegszeit wurde Frankfurt zum Zentrum kritischen Denkens in Deutschland. Die Universität bot den Raum für intensive Debatten über Aufklärung, Kulturindustrie und autoritäre Persönlichkeitsstrukturen. Jürgen Habermas, der bedeutendste Vertreter der zweiten Generation, lehrte hier und entwickelte seine Theorie des kommunikativen Handelns.\n\nDie Goethe-Universität war somit nicht nur geografischer Ort, sondern intellektueller Möglichkeitsraum für eine der einflussreichsten philosophischen Strömungen des 20. Jahrhunderts, die Gesellschaftskritik akademisch etablierte."

