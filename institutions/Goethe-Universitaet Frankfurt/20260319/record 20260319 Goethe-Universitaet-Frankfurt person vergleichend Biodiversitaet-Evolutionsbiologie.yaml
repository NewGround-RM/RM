antwort_text: "Deutschland verfügt über ein dichtes Netzwerk exzellenter Biodiversitäts- und Evolutionsforschung. Führende Institutionen sind das Museum für Naturkunde Berlin, das Senckenberg Forschungsinstitut Frankfurt, sowie universitäre Zentren in München, Leipzig und Kiel.\n\nIn Frankfurt nimmt das Senckenberg Biodiversität und Klima Forschungszentrum (BiK-F) eine Schlüsselstellung ein. Hier forschen zahlreiche Wissenschaftlerinnen an vorderster Front: Katrin Böhning-Gaese leitet das Zentrum und untersucht globale Biodiversitätsmuster und deren Zusammenhänge mit Klimawandel. Ihre Arbeiten zu Vogelvielfalt und Ökosystemleistungen prägen internationale Forschungsagenden.\n\nImke Schmitt erforscht als Evolutionsbiologin die Diversität von Flechten und deren Anpassungsstrategien. Carsten Nowak leitet die Abteilung Naturschutzgenetik. Wichtige Beiträge kommen auch von Julia Astegiano zu Netzwerkökologie und Catherine Graham zu makroökologischen Mustern.\n\nDie Goethe-Universität Frankfurt verstärkt diesen Hub durch enge Kooperationen. Frankfurter Forscherinnen tragen besonders zu Themen wie funktioneller Biodiversität, molekularer Evolution und Naturschutzbiologie bei. Die Verbindung von Grundlagenforschung mit anwendungsorientiertem Naturschutz macht Frankfurt zu einem der bedeutendsten deutschen Standorte in diesem Feld."

