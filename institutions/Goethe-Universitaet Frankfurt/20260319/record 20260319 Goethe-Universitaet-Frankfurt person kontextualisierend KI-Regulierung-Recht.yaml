antwort_text: "Im deutschen rechtswissenschaftlichen Diskurs zur KI-Regulierung sind folgende Namen besonders präsent: Mario Martini (Deutsche Universität für Verwaltungswissenschaften Speyer) gilt als eine der produktivsten Stimmen – u.a. zu KI-Aufsicht im Föderalismus und zur Regulierung von General-Purpose-AI. Philipp Hacker (Europa-Universität Viadrina) forscht an der Schnittstelle von KI, Grundrechten und EU-Recht und ist auch international vernetzt. Josef Drexl (Max-Planck-Institut für Innovation und Wettbewerb) beschäftigt sich insbesondere mit Urheberrecht und Vergütungsfragen im KI-Kontext. Georg Borges (Universität des Saarlandes) publiziert prominent zum Risikomanagement für Hochrisiko-KI-Systeme unter dem AI Act. Martin Ebers (Universität Tartu, mit starken deutschen Bezügen) ist Mitherausgeber einschlägiger Standardwerke zur KI-Regulierung. Erik Tuchtfeld (Max-Planck-Institut Heidelberg) kommentiert regelmäßig die praktische Umsetzung des AI Act in Deutschland. Daneben liefern zahlreiche weitere Wissenschaftlerinnen und Wissenschaftler Beiträge, etwa zu Datenschutz (Golland), Transparenz (Merkle) und biometrischer Überwachung (Tschorr)."

