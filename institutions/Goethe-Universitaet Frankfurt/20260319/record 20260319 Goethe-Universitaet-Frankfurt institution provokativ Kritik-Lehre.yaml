antwort_text: "An der Goethe-Universität Frankfurt gibt es durchaus Kritikpunkte hinsichtlich Lehre und Betreuung, die sich aus Studierendenbefragungen und öffentlichen Diskussionen ergeben:\n\nBetreuungsverhältnis: In vielen Fachbereichen wird das ungünstige Verhältnis von Lehrenden zu Studierenden bemängelt. Besonders in Massenfächern wie Psychologie, Rechtswissenschaften oder Wirtschaftswissenschaften führt dies zu überfüllten Hörsälen und eingeschränkten Kontaktmöglichkeiten zu Dozierenden.\n\nKommunikation und Organisation: Studierende kritisieren teilweise mangelhafte Erreichbarkeit von Dozierenden und wissenschaftlichen Mitarbeitern sowie unzureichende Rückmeldungen zu Hausarbeiten und Prüfungsleistungen. Administrative Abläufe werden gelegentlich als intransparent wahrgenommen.\n\nDigitalisierung: Trotz Fortschritten durch die Corona-Pandemie gibt es weiterhin Kritik an der digitalen Infrastruktur und der Integration digitaler Lehrformate.\n\nPraxisbezug: In einigen Studiengängen wird ein stärkerer Praxisbezug und mehr Unterstützung beim Berufseinstieg gewünscht.\n\nFachbereichsunterschiede: Die Qualität variiert erheblich zwischen den Fachbereichen. Während kleinere Institute oft für gute Betreuung gelobt werden, kämpfen größere Fachbereiche mit strukturellen Problemen.\n\nDie Universität arbeitet kontinuierlich an Verbesserungen durch Qualitätssicherungsmaßnahmen und Evaluationen."

