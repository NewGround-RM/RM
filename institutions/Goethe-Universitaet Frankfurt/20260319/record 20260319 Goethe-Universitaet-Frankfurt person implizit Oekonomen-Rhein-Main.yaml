antwort_text: "Einflussreiche Ökonominnen und Ökonomen im Rhein-Main-Gebiet:\n\nDie Region Frankfurt/Rhein-Main ist ein wichtiges Zentrum der Wirtschaftswissenschaften in Deutschland. An der Goethe-Universität Frankfurt prägen mehrere renommierte Forschende die Diskussion:\n\nVolker Wieland ist ein führender Makroökonom und Mitglied des Sachverständigenrats zur Begutachtung der gesamtwirtschaftlichen Entwicklung. Er forscht zu Geldpolitik und makroökonomischer Modellierung.\n\nNicola Fuchs-Schündeln gehört zu den einflussreichsten Arbeitsmarktökonominnen Deutschlands und erforscht Arbeitsmarktdynamiken, Migrationsfragen und Politikevaluation.\n\nRoman Inderst ist ein international anerkannter Experte für Verhaltensökonomik, Industrieökonomik und Finanzmarktregulierung.\n\nMichael Haliassos forscht zu Haushaltsfinanzen und Vermögensbildung und leitet das House of Finance.\n\nAn der TU Darmstadt arbeitet Tobias Hlobil zu Innovationsökonomik und Wirtschaftspolitik.\n\nDie Nähe zur Europäischen Zentralbank und zur Deutschen Bundesbank bringt zusätzlich hochrangige Ökonominnen und Ökonomen in die Region, die zwar nicht primär an Universitäten tätig sind, aber durch Vorträge, Politikberatung und Forschungskooperationen erheblichen Einfluss ausüben.\n\nDiese Expertinnen und Experten prägen durch Publikationen, Politikberatung und Medienauftritte die wirtschaftspolitische Debatte weit über die Region hinaus."

