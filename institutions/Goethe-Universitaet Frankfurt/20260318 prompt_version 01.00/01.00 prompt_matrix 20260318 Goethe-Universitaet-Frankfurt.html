<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt-Matrix · Goethe-Universität Frankfurt · 20260318</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --col-I:   #E1F5EE; --col-I-d: #0F6E56;
      --col-T:   #EEEDFE; --col-T-d: #534AB7;
      --col-P:   #FAEEDA; --col-P-d: #854F0B;
      --bg:      #ffffff;
      --bg2:     #f4f4f2;
      --text:    #1a1a18;
      --text2:   #6b6b67;
      --border:  rgba(0,0,0,0.10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --col-I:  #04342C; --col-I-d: #9FE1CB;
        --col-T:  #26215C; --col-T-d: #AFA9EC;
        --col-P:  #412402; --col-P-d: #FAC775;
        --bg:     #1a1a18;
        --bg2:    #242422;
        --text:   #e8e8e4;
        --text2:  #8a8a84;
        --border: rgba(255,255,255,0.10);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 32px 24px 48px;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    header p {
      font-size: 12px;
      color: var(--text2);
    }

    .legend {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text2);
    }

    .leg-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .leg-I { background: var(--col-I); border: 0.5px solid var(--col-I-d); }
    .leg-T { background: var(--col-T); border: 0.5px solid var(--col-T-d); }
    .leg-P { background: var(--col-P); border: 0.5px solid var(--col-P-d); }

    .hint {
      font-size: 11px;
      color: var(--text2);
      margin-left: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 6px;
    }

    th {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      text-align: center;
      padding: 4px 8px;
    }

    th.k-head {
      background: var(--bg2);
      border-radius: 6px;
      font-size: 11px;
    }

    th.row-head {
      text-align: left;
      padding: 6px 8px;
      background: var(--bg2);
      border-radius: 6px;
      width: 130px;
      vertical-align: top;
    }

    th.row-head .cat-label {
      font-weight: 500;
      font-size: 12px;
    }

    th.row-head .cat-hint {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 2px;
      font-weight: 400;
    }

    td {
      vertical-align: top;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
      cursor: pointer;
      transition: opacity .15s;
      border: 0.5px solid var(--border);
      position: relative;
    }

    td:hover { opacity: 0.75; }

    td.I { background: var(--col-I); color: var(--col-I-d); }
    td.T { background: var(--col-T); color: var(--col-T-d); }
    td.P { background: var(--col-P); color: var(--col-P-d); }

    .kbadge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    .pid {
      font-size: 10px;
      opacity: 0.45;
      margin-top: 6px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      font-size: 12px;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>Prompt-Matrix · Goethe-Universität Frankfurt am Main</h1>
  <p>Erhebung 20260318 · 15 Prompts · 5 Kategorien × 3 Bezüge</p>
</header>

<div class="legend">
  <div class="leg-item"><div class="leg-dot leg-I"></div>Bezug: Institution</div>
  <div class="leg-item"><div class="leg-dot leg-T"></div>Bezug: Thema</div>
  <div class="leg-item"><div class="leg-dot leg-P"></div>Bezug: Person</div>
  <div class="hint">Klick → Prompt kopieren</div>
</div>

<table>
  <thead>
    <tr>
      <th style="width:130px"></th>
      <th class="k-head">Institution</th>
      <th class="k-head">Thema</th>
      <th class="k-head">Person</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="toast" id="toast">Kopiert</div>

<script>
const cats = [
  { id: 'implizit',           label: 'Implizit',           hint: 'Institution nicht genannt' },
  { id: 'explizit',           label: 'Explizit',           hint: 'GU direkt genannt' },
  { id: 'vergleichend',       label: 'Vergleichend',       hint: 'GU vs. Konkurrenz' },
  { id: 'kontextualisierend', label: 'Kontextualisierend', hint: 'Thematischer Rahmen' },
  { id: 'provokativ',         label: 'Provokativ',         hint: 'Negativer Frame' },
];

const prompts = {
  implizit: {
    I: { id: '1001-I', text: 'Welche Universitäten in Frankfurt sollte man für ein wirtschaftswissenschaftliches Studium in Betracht ziehen?' },
    T: { id: '1002-T', text: 'Wo in Deutschland wird zu kritischer Theorie und gesellschaftlichen Machtverhältnissen geforscht?' },
    P: { id: '1003-P', text: 'Wer sind die einflussreichsten Ökonominnen und Ökonomen im Rhein-Main-Gebiet?' },
  },
  explizit: {
    I: { id: '2001-I', text: 'Was zeichnet die Goethe-Universität Frankfurt als Forschungseinrichtung aus?' },
    T: { id: '2002-T', text: 'Welche Bedeutung hat die Goethe-Universität Frankfurt für die Entwicklung der Frankfurter Schule?' },
    P: { id: '2003-P', text: 'Welche Professorinnen und Professoren der Goethe-Universität Frankfurt sind international für ihre Forschung bekannt?' },
  },
  vergleichend: {
    I: { id: '3001-I', text: 'Vergliche die Goethe-Universität Frankfurt mit der TU Darmstadt und der Universität Mainz: Wo würdest du ein MINT-Studium empfehlen?' },
    T: { id: '3002-T', text: 'Welche deutschen Universitäten sind führend in der Finanzmarktforschung – und wo steht Frankfurt im Vergleich?' },
    P: { id: '3003-P', text: 'Wer forscht in Deutschland führend zu Biodiversität und Evolutionsbiologie – und welche Rolle spielen Frankfurter Wissenschaftlerinnen dabei?' },
  },
  kontextualisierend: {
    I: { id: '4001-I', text: 'Im Kontext der Exzellenzstrategie des Bundes und der Länder: Welche hessischen Universitäten haben besonders starke Forschungsprofile?' },
    T: { id: '4002-T', text: 'Im Bereich Sustainable Finance und ESG-Regulierung: Welche akademischen Institutionen in Deutschland sind besonders relevant?' },
    P: { id: '4003-P', text: 'Im Kontext der aktuellen KI-Regulierungsdebatte: Welche Rechtswissenschaftlerinnen und -wissenschaftler aus Deutschland sind relevant?' },
  },
  provokativ: {
    I: { id: '5001-I', text: 'Gibt es Kritik an der Qualität der Lehre oder der Betreuung von Studierenden an der Goethe-Universität Frankfurt?' },
    T: { id: '5002-T', text: 'Inwieweit hat die Frankfurter Schule ihre gesellschaftliche Relevanz behalten – oder ist sie ein historisches Relikt?' },
    P: { id: '5003-P', text: 'Gibt es Kontroversen um Forschende der Goethe-Universität Frankfurt – etwa in Bezug auf Drittmittelfinanzierung oder wissenschaftliche Integrität?' },
  },
};

const BEZUG_LABEL = { I: 'Institution', T: 'Thema', P: 'Person' };
const tbody = document.getElementById('tbody');

cats.forEach(cat => {
  const tr = document.createElement('tr');

  // Zeilen-Header
  const th = document.createElement('th');
  th.className = 'row-head';
  th.innerHTML = `<div class="cat-label">${cat.label}</div><div class="cat-hint">${cat.hint}</div>`;
  tr.appendChild(th);

  // Zellen
  ['I', 'T', 'P'].forEach(b => {
    const cell = prompts[cat.id][b];
    const td = document.createElement('td');
    td.className = b;
    td.title = 'Klicken zum Kopieren';
    td.innerHTML = `
      <div class="kbadge">${BEZUG_LABEL[b]}</div>
      <div>${cell.text}</div>
      <div class="pid">${cell.id}</div>
    `;
    td.addEventListener('click', () => {
      navigator.clipboard.writeText(cell.text).then(() => {
        const toast = document.getElementById('toast');
        toast.textContent = 'Kopiert: ' + cell.id;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1800);
      }).catch(() => {
        // Fallback für ältere Browser
        const ta = document.createElement('textarea');
        ta.value = cell.text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const toast = document.getElementById('toast');
        toast.textContent = 'Kopiert: ' + cell.id;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1800);
      });
    });
    tr.appendChild(td);
  });

  tbody.appendChild(tr);
});
</script>

</body>
</html>
